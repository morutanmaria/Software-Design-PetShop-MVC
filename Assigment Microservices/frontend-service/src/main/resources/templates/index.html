<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="d-flex justify-content-end p-2 gap-2">
    <a th:href="@{/(lang=en)}"
       th:classappend="${currentLang == 'en'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
        🇬🇧 EN
    </a>
    <a th:href="@{/(lang=ro)}"
       th:classappend="${currentLang == 'ro'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
        🇷🇴 RO
    </a>
</div>

<div class="container text-center mt-5">
    <h1 class="mb-4">🐾 <span th:text="#{nav.home}">Welcome to PetShop</span></h1>

    <div class="d-flex justify-content-center gap-3">
        <a href="/pets" class="btn btn-primary btn-lg">
            <i class="fa-solid fa-dog"></i> <span th:text="#{nav.pets}">Pets</span>
        </a>
        <a href="/items" class="btn btn-info btn-lg text-white">
            <i class="fa-solid fa-basket-shopping"></i> <span th:text="#{nav.items}">Items</span>
        </a>
        <a href="/chat" class="btn btn-secondary btn-lg">
            <i class="fa-solid fa-comments"></i> <span th:text="#{nav.chat}">Live Chat</span>
        </a>

        <a th:if="${loggedUser == null}" href="/login" class="btn btn-success btn-lg">
            <i class="fa-solid fa-right-to-bracket"></i> <span th:text="#{nav.login}">Login</span>
        </a>
        <a th:if="${loggedUser != null}" href="/logout" class="btn btn-danger btn-lg">
            <i class="fa-solid fa-right-from-bracket"></i> <span th:text="#{nav.logout}">Logout</span>
        </a>
    </div>

    <p class="text-muted mt-3"
       th:if="${loggedUser != null}"
       th:text="#{nav.loggedAs(${loggedUser.username}, ${loggedUser.role})}">
        Logged in as Guest (USER)
    </p>
</div>

</body>
</html>
