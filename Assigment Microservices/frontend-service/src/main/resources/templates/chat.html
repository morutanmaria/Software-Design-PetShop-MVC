<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{chat.title}">Live Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="d-flex justify-content-end p-2 gap-2">
    <a th:href="@{/chat(lang=en)}"
       th:classappend="${currentLang == 'en'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
        🇬🇧 EN
    </a>
    <a th:href="@{/chat(lang=ro)}"
       th:classappend="${currentLang == 'ro'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
        🇷🇴 RO
    </a>
</div>

<div class="container mt-4" style="max-width: 700px;">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>
            <i class="fa-solid fa-comments me-2"></i>
            <span th:text="#{chat.title}">Live Chat</span>
        </h2>
        <div class="d-flex align-items-center gap-2">
            <span id="connectionStatus" class="badge bg-warning text-dark"
                  th:text="#{chat.connecting}">Connecting...</span>
            <a href="/" class="btn btn-outline-secondary btn-sm" th:text="#{nav.home}">Home</a>
        </div>
    </div>

    <div id="usernamePrompt" class="card shadow p-4 mb-3"
         th:style="${chatUsername != null} ? 'display:none' : 'display:block'">
        <h5 th:text="#{chat.username.prompt}">Enter your display name</h5>
        <div class="input-group">
            <input type="text" id="usernameInput" class="form-control"
                   th:placeholder="#{chat.username.prompt}" maxlength="30"/>
            <button class="btn btn-primary" onclick="joinChat()">
                <i class="fa-solid fa-right-to-bracket"></i>
                <span th:text="#{nav.login}">Join</span>
            </button>
        </div>
    </div>

    <div id="chatArea" th:style="${chatUsername != null} ? 'display:block' : 'display:none'">
        <div class="card shadow">

            <div id="messageArea"
                 class="card-body bg-white overflow-auto"
                 style="height: 420px; display: flex; flex-direction: column; gap: 10px;">
            </div>

            <div class="card-footer bg-light">
                <div class="input-group">
                    <input type="text" id="messageInput" class="form-control"
                           th:placeholder="#{chat.placeholder}"
                           onkeydown="if(event.key==='Enter') sendMessage()"/>
                    <button class="btn btn-primary" onclick="sendMessage()">
                        <i class="fa-solid fa-paper-plane me-1"></i>
                        <span th:text="#{chat.send}">Send</span>
                    </button>
                </div>
            </div>

        </div>
    </div>

</div>

<script th:inline="javascript">
    window._chatUsername  = /*[[${chatUsername}]]*/ null;
    window._petServiceUrl = /*[[${@environment.getProperty('pet.service.ws.url')}]]*/ 'http://localhost:8081';
    window._i18nChat = {
        connected:    /*[[#{chat.connected}]]*/ 'Connected',
        disconnected: /*[[#{chat.disconnected}]]*/ 'Disconnected',
        connecting:   /*[[#{chat.connecting}]]*/ 'Connecting...'
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="/js/chat.js"></script>

</body>
</html>
