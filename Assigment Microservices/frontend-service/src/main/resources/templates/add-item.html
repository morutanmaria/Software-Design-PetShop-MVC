<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="#{items.form.title.add}">Add Item</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="d-flex justify-content-end p-2 gap-2">
  <a th:href="@{/items/add(lang=en)}"
     th:classappend="${currentLang == 'en'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
    🇬🇧 EN
  </a>
  <a th:href="@{/items/add(lang=ro)}"
     th:classappend="${currentLang == 'ro'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
    🇷🇴 RO
  </a>
</div>

<div class="container mt-5" style="max-width: 500px;">
  <div class="card shadow p-4">

    <h3 th:text="#{items.form.title.add}">Add Item</h3>

    <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center mb-3" role="alert">
      <i class="fa fa-circle-exclamation me-2"></i>
      <span th:text="${errorMessage}"></span>
    </div>

    <form action="/items/add" method="post">

      <input class="form-control mb-2" name="name"
             th:placeholder="#{items.form.name}" required>
      <input class="form-control mb-2" name="description"
             th:placeholder="#{items.form.description}">
      <input class="form-control mb-2" name="price" type="number" step="0.01"
             th:placeholder="#{items.form.price}" required>

      <select name="type" class="form-select mb-2" required>
        <option value="FOOD"      th:text="#{items.form.type.food}">Food</option>
        <option value="TOY"       th:text="#{items.form.type.toy}">Toy</option>
        <option value="ACCESSORY" th:text="#{items.form.type.accessory}">Accessory</option>
      </select>

      <select name="petId" class="form-select mb-2">
        <option th:each="pet : ${pets}" th:value="${pet.id}" th:text="${pet.name}"></option>
      </select>

      <input class="form-control mb-2" name="imagePath"
             th:placeholder="#{items.form.imagePath}">

      <div class="d-flex gap-2">
        <button class="btn btn-success w-100" th:text="#{pet.form.save}">Save</button>
        <a href="/items" class="btn btn-outline-secondary w-100" th:text="#{pet.form.cancel}">Cancel</a>
      </div>
    </form>

  </div>
</div>

</body>
</html>
