<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="#{auth.register.title}">Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="d-flex justify-content-end p-2 gap-2">
  <a th:href="@{/register(lang=en)}"
     th:classappend="${currentLang == 'en'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
    🇬🇧 EN
  </a>
  <a th:href="@{/register(lang=ro)}"
     th:classappend="${currentLang == 'ro'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
    🇷🇴 RO
  </a>
</div>

<div class="container mt-5" style="max-width: 400px;">
  <div class="card shadow p-4">

    <h3 class="text-center mb-3">📝 <span th:text="#{auth.register.title}">Register</span></h3>

    <form th:action="@{/register}" method="post">

      <div class="mb-3">
        <label th:text="#{auth.username}">Username</label>
        <input class="form-control" type="text" name="username"
               th:placeholder="#{auth.username}" required>
      </div>

      <div class="mb-3">
        <label th:text="#{auth.password}">Password</label>
        <input class="form-control" type="password" name="password"
               th:placeholder="#{auth.password}" required>
      </div>

      <div class="mb-3">
        <label th:text="#{auth.email}">Email</label>
        <input type="email" name="email" class="form-control"
               th:placeholder="#{auth.email}" required>
      </div>

      <div class="mb-3">
        <label th:text="#{auth.role}">Role</label>
        <select class="form-select" name="role" required>
          <option value="SELLER">Seller</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>

      <button class="btn btn-primary w-100" th:text="#{auth.register.button}">Register</button>
    </form>

    <p class="mt-3 text-center">
      <span th:text="#{auth.login.link}">Already have an account?</span>
      <a th:href="@{/login}"><span th:text="#{nav.login}">Login</span></a>
    </p>

  </div>
</div>

</body>
</html>
