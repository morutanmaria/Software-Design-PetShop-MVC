<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{auth.login.title}">Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="d-flex justify-content-end p-2 gap-2">
    <a th:href="@{/login(lang=en)}"
       th:classappend="${currentLang == 'en'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
        🇬🇧 EN
    </a>
    <a th:href="@{/login(lang=ro)}"
       th:classappend="${currentLang == 'ro'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
        🇷🇴 RO
    </a>
</div>

<div class="container mt-5" style="max-width: 400px;">
    <div class="card shadow p-4">

        <h3 class="text-center mb-3">🔑 <span th:text="#{auth.login.title}">Login</span></h3>

        <div th:if="${error}" class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="fa fa-circle-exclamation me-2"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label th:text="#{auth.username}">Username</label>
                <input class="form-control" type="text" name="username"
                       th:placeholder="#{auth.username}" required>
            </div>

            <div class="mb-3">
                <label th:text="#{auth.password}">Password</label>
                <input class="form-control" type="password" name="password"
                       th:placeholder="#{auth.password}" required>
            </div>

            <button class="btn btn-success w-100" th:text="#{auth.login.button}">Login</button>
        </form>

        <p class="mt-3 text-center">
            <span th:text="#{auth.register.link}">Don't have an account?</span>
            <a th:href="@{/register}"><span th:text="#{nav.register}">Register</span></a>
        </p>

    </div>
</div>

</body>
</html>
