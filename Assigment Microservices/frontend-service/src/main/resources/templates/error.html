<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="container text-center mt-5" style="max-width: 500px;">
    <div class="card shadow p-5">

        <div class="display-1 fw-bold text-danger" th:text="${statusCode}">500</div>

        <h3 class="mt-3" th:text="${errorTitle}">Something Went Wrong</h3>

        <p class="text-muted mt-2" th:text="${errorDescription}">
            An unexpected error occurred. Please try again later.
        </p>

        <div class="mt-2 mb-4">
            <span class="badge bg-secondary font-monospace" th:text="${errorCode}">INTERNAL_ERROR</span>
        </div>

        <div class="d-flex justify-content-center gap-3">
            <a href="/" class="btn btn-primary">
                <i class="fa-solid fa-house me-1"></i> Home
            </a>
            <button onclick="history.back()" class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-1"></i> Go Back
            </button>
        </div>

    </div>
</div>

</body>
</html>
