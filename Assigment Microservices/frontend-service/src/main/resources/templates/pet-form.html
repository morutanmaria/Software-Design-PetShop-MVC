<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{pet.form.title.add}">Add Pet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="d-flex justify-content-end p-2 gap-2">
    <a th:href="@{/pets/add(lang=en)}"
       th:classappend="${currentLang == 'en'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
        🇬🇧 EN
    </a>
    <a th:href="@{/pets/add(lang=ro)}"
       th:classappend="${currentLang == 'ro'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
        🇷🇴 RO
    </a>
</div>

<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow p-4">

        <h3 th:text="#{pet.form.title.add}">Add Pet</h3>

        <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center mb-3" role="alert">
            <i class="fa fa-circle-exclamation me-2"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <form action="/pets/save" method="post">

            <input class="form-control mb-2" name="name"
                   th:placeholder="#{pet.form.name}" required>
            <input class="form-control mb-2" name="species"
                   th:placeholder="#{pet.form.species}">
            <input class="form-control mb-2" name="breed"
                   th:placeholder="#{pet.form.breed}">

            <select class="form-select mb-2" name="gender">
                <option value="" th:text="'-- ' + #{pet.form.gender} + ' --'">-- Gender --</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <input class="form-control mb-2" name="age" type="number"
                   th:placeholder="#{pet.form.age}">
            <input class="form-control mb-2" name="price" type="number" step="0.01"
                   th:placeholder="#{pet.form.price}">
            <input class="form-control mb-2" name="imagePath"
                   th:placeholder="#{pet.form.imagePath}">

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="available" id="available" checked>
                <label class="form-check-label" for="available" th:text="#{pet.form.available}">Available</label>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-success w-100" th:text="#{pet.form.save}">Save</button>
                <a href="/pets" class="btn btn-outline-secondary w-100" th:text="#{pet.form.cancel}">Cancel</a>
            </div>
        </form>

    </div>
</div>

</body>
</html>
