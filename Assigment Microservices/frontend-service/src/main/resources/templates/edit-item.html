<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="#{items.form.title.edit}">Edit Item</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="d-flex justify-content-end p-2 gap-2">
  <a th:href="@{/items/edit/{id}(id=${item.id},lang=en)}"
     th:classappend="${currentLang == 'en'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
    🇬🇧 EN
  </a>
  <a th:href="@{/items/edit/{id}(id=${item.id},lang=ro)}"
     th:classappend="${currentLang == 'ro'} ? 'btn btn-sm btn-dark' : 'btn btn-sm btn-outline-dark'">
    🇷🇴 RO
  </a>
</div>

<div class="container mt-5" style="max-width: 500px;">
  <div class="card shadow p-4">

    <h3 class="mb-4" th:text="#{items.form.title.edit}">Edit Item</h3>

    <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center mb-3" role="alert">
      <i class="fa fa-circle-exclamation me-2"></i>
      <span th:text="${errorMessage}"></span>
    </div>

    <form action="/items/update" method="post">

      <input type="hidden" name="id" th:value="${item.id}">

      <div class="mb-3">
        <label class="form-label" th:text="#{items.form.name}">Item Name</label>
        <input type="text" class="form-control" name="name" th:value="${item.name}" required>
      </div>

      <div class="mb-3">
        <label class="form-label" th:text="#{items.form.description}">Description</label>
        <input type="text" class="form-control" name="description" th:value="${item.description}">
      </div>

      <div class="mb-3">
        <label class="form-label" th:text="#{items.form.price}">Price</label>
        <input type="number" class="form-control" step="0.01" name="price" th:value="${item.price}" required>
      </div>

      <div class="mb-3">
        <label class="form-label" th:text="#{items.form.type}">Category</label>
        <select class="form-select" name="type" required>
          <option value="FOOD"      th:selected="${item.type == 'FOOD'}"      th:text="#{items.form.type.food}">Food</option>
          <option value="TOY"       th:selected="${item.type == 'TOY'}"       th:text="#{items.form.type.toy}">Toy</option>
          <option value="ACCESSORY" th:selected="${item.type == 'ACCESSORY'}" th:text="#{items.form.type.accessory}">Accessory</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label" th:text="#{items.form.pet}">Associated Pet</label>
        <select class="form-select" name="petId">
          <option th:each="p : ${pets}"
                  th:value="${p.id}"
                  th:text="${p.name}"
                  th:selected="${item.petId != null and item.petId == p.id}">
          </option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label" th:text="#{items.form.imagePath}">Image Link</label>
        <input type="text" class="form-control" name="imagePath" th:value="${item.imagePath}">
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning w-100">
          <i class="fa-solid fa-sync"></i> <span th:text="#{pet.form.save}">Update</span>
        </button>
        <a href="/items" class="btn btn-outline-secondary w-100" th:text="#{pet.form.cancel}">Cancel</a>
      </div>
    </form>

  </div>
</div>

</body>
</html>
